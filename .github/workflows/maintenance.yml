name: Mid-Day Maintenance

on:
  schedule:
    # Wakes up at 04:15 and 05:45 UTC 
    # This is 12:15 PM and 1:45 PM Singapore Time (Lunch Break)
    - cron: '15 4,5 * * *'
  workflow_dispatch:

jobs:
  maintenance-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 

      - name: Maintenance Logic
        run: |
          # 20% chance to skip (very consistent worker)
          if [ $((RANDOM % 100)) -lt 20 ]; then
            echo "Lunch break is for eating today. No work."
            exit 0
          fi

          git config --global user.name "BABEEEZ"
          git config --global user.email "Bbab3369@gmail.com"

          # Maintenance-style messages
          MESSAGES=(
            "chore: routine system maintenance"
            "style: minor log cleanup"
            "docs: update maintenance schedule"
            "chore: sync local build logs"
            "fix: minor formatting in log file"
          )
          
          MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          # Appending to a simple .txt file
          echo "Maintenance check completed at $(date)" >> build-log.txt

          git add build-log.txt
          git commit -m "$MSG"
          git push
